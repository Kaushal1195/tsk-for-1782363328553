version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: generated_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432" # Map host port 5433 to container port 5432
    volumes:
      - db_data:/var/lib/postgresql/data # Persistent data storage
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d generated_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/generated_db
      PORT: 5000
      JWT_SECRET: your_super_secret_jwt_key_please_change_this_in_production # IMPORTANT: Change this to a strong, random key
    depends_on:
      db:
        condition: service_healthy # Ensure DB is ready before starting backend
    volumes:
      - ./backend:/app/backend # Mount for development, remove for production
      - ./database:/app/database # Mount schema for migration
      - /app/backend/node_modules # Exclude node_modules from host mount

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:5000 # For local development, use host IP or localhost
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx)
    depends_on:
      backend:
        condition: service_started # Frontend needs backend to be running
    environment:
      # This env var is used during the build stage for Vite.
      # For runtime, if you need to change it without rebuilding,
      # you'd need a more dynamic Nginx config or a runtime env injection.
      # For now, it's set at build time.
      VITE_BACKEND_URL: http://backend:5000 # Internal Docker network URL for frontend to talk to backend
    volumes:
      - ./frontend:/app/frontend # Mount for development, remove for production
      - /app/frontend/node_modules # Exclude node_modules from host mount
      - /app/frontend/dist # Exclude dist from host mount

volumes:
  db_data:
